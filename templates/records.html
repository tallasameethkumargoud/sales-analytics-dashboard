<h2>Uploaded Dataset Records</h2>

<table border="1">

<tr>
    <th>Customer Name</th>
    <th>Product</th>
    <th>Amount</th>
</tr>

{% for record in records %}

<tr>
    <td>{{ record.customer_name }}</td>
    <td>{{ record.product }}</td>
    <td>{{ record.amount }}</td>
</tr>

{% endfor %}

</table>
