<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .card {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }
    h1 { font-size: 22px; color: #333; margin-bottom: 6px; }
    p.sub { color: #888; font-size: 14px; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600;
            color: #555; margin-bottom: 6px; }
    input {
        width: 100%; padding: 10px 14px;
        border: 1px solid #ddd; border-radius: 8px;
        font-size: 14px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: #2196F3; }

    .error {
        background: #fff3f3; color: #e53935;
        border: 1px solid #ffcdd2;
        border-radius: 8px; padding: 10px 14px;
        font-size: 13px; margin-bottom: 16px;
    }

    .btn {
        width: 100%; padding: 12px;
        background: #4CAF50; color: white;
        border: none; border-radius: 8px;
        font-size: 15px; font-weight: 600;
        cursor: pointer; transition: 0.2s;
    }
    .btn:hover { background: #388e3c; }

    .footer { text-align: center; margin-top: 20px;
              font-size: 13px; color: #888; }
    .footer a { color: #2196F3; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🚀 Create Account</h1>
    <p class="sub">Sign up to start uploading datasets</p>

    {% if errors %}
    <div class="error">
        <ul style="margin:0; padding-left:18px;">
            {% for e in errors %}<li>{{ e }}</li>{% endfor %}
        </ul>
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username"
                   value="{{ username|default:'' }}" required>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Choose a password" required>
        </div>
        <button class="btn" type="submit">Create Account</button>
    </form>

    <div class="footer">
        Already have an account? <a href="/login/">Login</a>
    </div>
</div>
</body>
</html>
