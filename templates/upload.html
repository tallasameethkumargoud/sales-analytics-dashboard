<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dataset</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4ff 0%, #f5f5f5 100%);
        min-height: 100vh;
        padding: 0;
    }

    /* Navbar */
    .navbar {
        background: white;
        padding: 14px 32px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .navbar-brand {
        font-weight: 800;
        font-size: 17px;
        color: #1a1a1a;
        letter-spacing: -0.3px;
    }
    .navbar-links {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .nav-user {
        background: #f0f4ff;
        color: #1976d2;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }
    .nav-link {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        color: #555;
        transition: 0.15s;
    }
    .nav-link:hover { background: #f5f5f5; color: #333; }
    .nav-link.danger { color: #e53935; }
    .nav-link.danger:hover { background: #fff3f3; }

    /* Page layout */
    .page {
        display: flex;
        justify-content: center;
        padding: 48px 20px;
    }

    .container {
        background: white;
        border-radius: 20px;
        padding: 44px;
        width: 100%;
        max-width: 660px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    .page-title {
        font-size: 26px;
        font-weight: 800;
        color: #1a1a1a;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
    }
    .page-sub {
        color: #888;
        font-size: 14px;
        margin-bottom: 32px;
    }

    /* Drop zone */
    .drop-zone {
        border: 2px dashed #c5d8ff;
        border-radius: 16px;
        padding: 52px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: #fafcff;
        color: #555;
    }
    .drop-zone:hover, .drop-zone.dragover {
        background: #eef4ff;
        border-color: #2196F3;
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(33,150,243,0.12);
    }
    .drop-zone .icon { font-size: 44px; margin-bottom: 12px; }
    .drop-zone .title { font-size: 16px; font-weight: 600; color: #333; }
    .drop-zone .hint { font-size: 13px; color: #aaa; margin-top: 6px; }
    .drop-zone .browse { color: #2196F3; font-weight: 700; cursor: pointer; }
    .drop-zone .formats {
        margin-top: 14px;
        display: inline-flex;
        gap: 8px;
    }
    .format-tag {
        background: #f0f4ff;
        color: #1976d2;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        letter-spacing: 0.3px;
    }
    #fileInput { display: none; }

    /* File info */
    .file-info {
        display: none;
        align-items: center;
        gap: 14px;
        background: #f0f7ff;
        border: 1px solid #c5d8ff;
        border-radius: 12px;
        padding: 14px 18px;
        margin-top: 16px;
    }
    .file-icon {
        width: 40px; height: 40px;
        background: #2196F3;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; flex-shrink: 0;
    }
    .file-details { flex: 1; }
    .file-name { font-weight: 700; color: #1a1a1a; font-size: 14px; }
    .file-size { color: #888; font-size: 12px; margin-top: 2px; }
    .remove-btn {
        background: none; border: none;
        color: #bbb; cursor: pointer;
        font-size: 20px; padding: 4px;
        border-radius: 6px; transition: 0.15s;
    }
    .remove-btn:hover { color: #e53935; background: #fff3f3; }

    /* Status */
    .status {
        margin-top: 14px;
        font-size: 13px;
        font-weight: 600;
        min-height: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .status.error   { color: #e53935; }
    .status.success { color: #2e7d32; }
    .status.info    { color: #1976d2; }

    /* Preview */
    .preview-section { display: none; margin-top: 28px; }
    .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }
    .preview-title { font-size: 14px; font-weight: 700; color: #333; }
    .preview-meta  { font-size: 12px; color: #888; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: linear-gradient(90deg, #1976d2, #2196F3); }
    th { color: white; padding: 10px 14px; text-align: left; font-weight: 600; }
    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child  { border-radius: 0 8px 0 0; }
    td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
    tr:hover td { background: #f8fbff; }
    tr:last-child td { border-bottom: none; }
    .table-wrap {
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #e8eef8;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 12px; margin-top: 28px; }
    .btn {
        flex: 1; padding: 13px;
        border: none; border-radius: 10px;
        font-size: 15px; font-weight: 700;
        cursor: pointer; transition: all 0.2s;
        letter-spacing: 0.1px;
    }
    .btn-primary {
        background: linear-gradient(135deg, #1976d2, #2196F3);
        color: white;
        box-shadow: 0 4px 12px rgba(33,150,243,0.3);
    }
    .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(33,150,243,0.4);
    }
    .btn-primary:disabled {
        background: #90caf9;
        box-shadow: none;
        transform: none;
        cursor: not-allowed;
    }
    .btn-secondary {
        background: #f5f5f5;
        color: #666;
        border: 1px solid #e0e0e0;
    }
    .btn-secondary:hover { background: #ececec; color: #333; }

    /* Spinner */
    .spinner {
        display: inline-block;
        width: 15px; height: 15px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success overlay */
    #successOverlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(255,255,255,0.97);
        z-index: 999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        text-align: center;
    }
    .success-icon {
        width: 80px; height: 80px;
        background: linear-gradient(135deg, #43a047, #66bb6a);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
        box-shadow: 0 8px 24px rgba(67,160,71,0.3);
        animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }
    @media (max-width: 768px) {
        .navbar { padding: 12px 16px; }
        .navbar-links { display: none; }
        .page { padding: 20px 12px; }
        .container { padding: 24px 16px; border-radius: 12px; }
        .btn-row { flex-direction: column; }
        .drop-zone { padding: 32px 16px; }
        input[type="range"] { width: 100%; }
    }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="navbar-brand">📂 Data Platform</span>
        <div class="navbar-links">
            <span class="nav-user">👤 {{ user.username }}</span>
            <a href="/analytics/" class="nav-link">📊 Analytics</a>
            <a href="/datasets/" class="nav-link">🗂️ History</a>
            <a href="/upload/"    class="nav-link">⬆️ Upload</a>
            <a href="/logout/"    class="nav-link danger">🚪 Logout</a>
        </div>
    </nav>

    <!-- Success Overlay -->
    <div id="successOverlay">
        <div class="success-icon">✓</div>
        <h2 style="font-size:26px; font-weight:800; color:#2e7d32;">Data Processed Successfully!</h2>
        <p id="overlayRowCount" style="font-size:16px; color:#555;"></p>
        <div style="display:flex; align-items:center; gap:8px; color:#1976d2; font-size:14px; margin-top:8px;">
            <div style="width:16px;height:16px;border:2px solid #1976d2;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            Redirecting to your dashboard...
        </div>
    </div>

    <div class="page">
    <div class="container">

        <h1 class="page-title">⬆️ Upload Dataset</h1>
        <p class="page-sub">Upload a CSV file to ingest it into the data platform.</p>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
            <div class="icon">☁️</div>
            <div class="title">Drag & drop your CSV here</div>
            <div class="hint">or <span class="browse" id="browseBtn">browse files</span></div>
            <div class="formats">
                <span class="format-tag">CSV</span>
                <span class="format-tag">MAX 5MB</span>
            </div>
            <input type="file" id="fileInput" accept=".csv">
        </div>

        <!-- File info -->
        <div class="file-info" id="fileInfo">
            <div class="file-icon">📄</div>
            <div class="file-details">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            <button class="remove-btn" id="removeBtn" title="Remove">✕</button>
        </div>

        <!-- Status -->
        <div class="status" id="statusMsg"></div>

        <!-- Preview -->
        <div class="preview-section" id="previewSection">
            <div class="preview-header">
                <span class="preview-title">📋 Data Preview</span>
                <span class="preview-meta" id="previewMeta"></span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead id="previewHead"></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-row" id="btnRow" style="display:none;">
            <button class="btn btn-secondary" id="cancelBtn">✕ Cancel</button>
            <button class="btn btn-primary"   id="confirmBtn">✅ Confirm & Process</button>
        </div>

    </div>
    </div>

<script>
const dropZone   = document.getElementById("dropZone");
const fileInput  = document.getElementById("fileInput");
const browseBtn  = document.getElementById("browseBtn");
const fileInfo   = document.getElementById("fileInfo");
const fileName   = document.getElementById("fileName");
const fileSize   = document.getElementById("fileSize");
const removeBtn  = document.getElementById("removeBtn");
const statusMsg  = document.getElementById("statusMsg");
const previewSec = document.getElementById("previewSection");
const previewMeta= document.getElementById("previewMeta");
const previewHead= document.getElementById("previewHead");
const previewBody= document.getElementById("previewBody");
const btnRow     = document.getElementById("btnRow");
const confirmBtn = document.getElementById("confirmBtn");
const cancelBtn  = document.getElementById("cancelBtn");

let selectedFile = null;

browseBtn.addEventListener("click", e => { e.stopPropagation(); fileInput.click(); });
dropZone.addEventListener("click",  () => fileInput.click());
fileInput.addEventListener("change", e => handleFile(e.target.files[0]));

dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
});

removeBtn.addEventListener("click", resetUI);
cancelBtn.addEventListener("click", resetUI);

function handleFile(file) {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setStatus("❌ Only CSV files are allowed.", "error"); return; }
    if (file.size > 5 * 1024 * 1024) { setStatus("❌ File too large. Max 5MB.", "error"); return; }

    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = (file.size / 1024).toFixed(1) + " KB";
    fileInfo.style.display = "flex";
    setStatus("⏳ Previewing your data...", "info");
    sendPreview(file);
}

function sendPreview(file) {
    const fd = new FormData();
    fd.append("file", file);
    fetch("/preview/", {
        method: "POST",
        headers: { "X-CSRFToken": getCookie("csrftoken") },
        body: fd
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            setStatus("❌ " + data.error, "error");
            btnRow.style.display = "none";
            previewSec.style.display = "none";
            return;
        }
        renderPreview(data);
        setStatus("✅ File looks good — " + data.total_rows + " rows detected.", "success");
        btnRow.style.display = "flex";
    })
    .catch(() => setStatus("❌ Preview failed. Try again.", "error"));
}

function renderPreview(data) {
    previewHead.innerHTML = "<tr>" + data.columns.map(c => `<th>${c}</th>`).join("") + "</tr>";
    previewBody.innerHTML = data.preview.map(row =>
        "<tr>" + data.columns.map(c => `<td>${row[c] ?? ""}</td>`).join("") + "</tr>"
    ).join("");
    previewMeta.textContent = `Showing first ${data.preview.length} of ${data.total_rows} rows`;
    previewSec.style.display = "block";
}

confirmBtn.addEventListener("click", () => {
    if (!selectedFile) return;
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<span class="spinner"></span> Processing...';
    const fd = new FormData();
    fd.append("file", selectedFile);
    fetch("/", {
        method: "POST",
        headers: { "X-CSRFToken": getCookie("csrftoken") },
        body: fd
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            setStatus("❌ " + data.error, "error");
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = "✅ Confirm & Process";
            return;
        }
        const overlay = document.getElementById("successOverlay");
        document.getElementById("overlayRowCount").textContent =
            `${data.rows_processed} rows ingested into the database.`;
        overlay.style.display = "flex";
        setTimeout(() => window.location.href = data.redirect, 2000);
    })
    .catch(() => {
        setStatus("❌ Upload failed. Try again.", "error");
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = "✅ Confirm & Process";
    });
});

function setStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = "status " + type;
}

function resetUI() {
    selectedFile = null;
    fileInput.value = "";
    fileInfo.style.display   = "none";
    previewSec.style.display = "none";
    btnRow.style.display     = "none";
    setStatus("", "");
    fileName.textContent = "";
    fileSize.textContent = "";
    confirmBtn.disabled = false;
    confirmBtn.innerHTML = "✅ Confirm & Process";
}

function getCookie(name) {
    const val = document.cookie.split(";").find(c => c.trim().startsWith(name + "="));
    return val ? val.split("=")[1] : "";
}
</script>
</body>
</html>
